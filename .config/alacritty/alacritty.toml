
[env]
TERM = "xterm-256color"

[font]
size = 13.0

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[scrolling]
history = 10000
multiplier = 3

[window.padding]
x = 4
y = 4

[general]
import = ["/Users/fumiyanakamura/.config/alacritty/catppuccin_theme/catppuccin-latte.toml"]

[window]
opacity = 0.5
blur = true
# decorations = "none"         # ウィンドウの枠（バーなど）を消す
# startup_mode = "Maximized"   # 起動時に最大化（完全な全画面化ではない）

[keyboard]
bindings = [
  { key = "Enter", mods = "Alt", action = "ToggleSimpleFullscreen" }, # フルスクリーン切替（Spaceを作らないので透過が効く）
  { key = "Enter", mods = "Shift", chars = "\u001b\r" },            # ESC+CRを送る。Claude Code等で改行挿入になる
]
